name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install build tools
        run: dnf -y install git-core rpm-build rpmdevtools cups
      - uses: actions/checkout@v4
      - name: Build RPM
        run: |
          version=$(rpmspec -q --qf '%{version}\n' --srpm pm-241-bt-open.spec)
          rpmdev-setuptree
          git config --global --add safe.directory "$PWD"
          git archive --format=tar.gz --prefix="PM-241-BT-open-$version/" \
              -o "$HOME/rpmbuild/SOURCES/PM-241-BT-open-$version.tar.gz" HEAD
          rpmbuild -ba pm-241-bt-open.spec
          mkdir dist
          cp "$HOME"/rpmbuild/RPMS/noarch/*.rpm "$HOME"/rpmbuild/SRPMS/*.rpm dist/
      - name: Validate PPD
        run: cupstestppd -W all PM-241-BT-open.ppd
      - uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: dist/*.rpm

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential debhelper
      - name: Build deb
        run: |
          upstream=$(dpkg-parsechangelog -S Version | sed 's/-[^-]*$//')
          git archive --format=tar.gz --prefix="pm-241-bt-open-$upstream/" \
              -o "../pm-241-bt-open_$upstream.orig.tar.gz" HEAD
          dpkg-buildpackage -us -uc
          mkdir dist
          cp ../*.deb dist/
      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: dist/*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [rpm, deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "PM-241-BT-open $GITHUB_REF_NAME" --generate-notes dist/*
